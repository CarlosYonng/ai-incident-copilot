services:
  mysql:
    image: mysql:8.4
    container_name: incident-copilot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: incident_copilot
      MYSQL_USER: incident
      MYSQL_PASSWORD: incident
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: incident-copilot-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/incident_copilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: incident
      SPRING_DATASOURCE_PASSWORD: incident
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DIAGNOSIS_MCP_BASE_URL: http://host.docker.internal:8200
      RUNBOOK_DIR: /runbooks
    ports:
      - "8080:8080"
    volumes:
      - ./runbooks:/runbooks:ro
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: incident-copilot-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql-data:
