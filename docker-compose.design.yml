services:
  diagnosis-service:
    build:
      context: ../diagnosis-service
    container_name: diagnosis-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///data/diagnosis.db

  demo-service:
    build:
      context: ../diagnosis-service
    container_name: demo-service
    command: ["python", "-m", "demo_service"]
    ports:
      - "8001:8001"
    depends_on:
      - diagnosis-service

  incident-copilot-backend:
    build:
      context: ./backend
    container_name: incident-copilot-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/incident_copilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: incident_copilot
      SPRING_DATASOURCE_PASSWORD: incident_copilot123
      DIAGNOSIS_MCP_BASE_URL: http://diagnosis-service:8000
      LOG_PATH: /app/logs
    volumes:
      - ./logs/backend:/app/logs
    depends_on:
      - diagnosis-service

  incident-copilot-frontend:
    build:
      context: ./frontend
    container_name: incident-copilot-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - incident-copilot-backend
